<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="css/ai-theme.css">
    
    <style>
        /* CSS 變數定義，方便管理主題顏色 */
        :root {
            --bg-primary: #f0f7ff;
            --text-primary: #334e68;
            --primary-color: #007bff;
            --secondary-color: #ffc107;
            --accent-color: #28a745;
            --card-bg: #ffffff;
            --card-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
            --card-hover-shadow: 0 8px 25px rgba(0, 0, 0, 0.12);
            --radius: 12px;
            --transition: all 0.3s ease-in-out;
        }
        
        /* 深色主題變數 */
        [data-theme="dark"] {
            --bg-primary: #1a1a2e;
            --text-primary: #e2e8f0;
            --primary-color: #6366f1;
            --secondary-color: #fbbf24;
            --accent-color: #10b981;
            --card-bg: #2d2d44;
            --card-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            --card-hover-shadow: 0 8px 25px rgba(0, 0, 0, 0.4);
            --radius: 12px;
            --transition: all 0.3s ease-in-out;
        }

        /* 基礎樣式 */
        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            margin: 0;
            padding: 0;
            font-family: 'Helvetica Neue', Arial, 'Microsoft JhengHei', sans-serif;
            min-height: 100vh;
            transition: var(--transition);
        }

        .container {
            padding: 30px 20px;
            max-width: 900px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 標題 */
        h1 {
            color: var(--primary-color);
            text-align: center;
            margin-bottom: 30px;
            font-size: 3em;
            font-weight: 700;
            text-shadow: 2px 2px 5px rgba(0, 123, 255, 0.1);
        }

        /* 頁籤導覽列 */
        .tabs {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
            background-color: var(--card-bg);
            padding: 10px;
            border-radius: 50px;
            box-shadow: var(--card-shadow);
        }

        .tab-btn {
            background: transparent;
            color: var(--text-primary);
            border: none;
            padding: 12px 25px;
            border-radius: 30px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            white-space: nowrap;
        }

        .tab-btn:hover {
            color: var(--primary-color);
        }

        .tab-btn.active {
            background: var(--primary-color);
            color: white;
            box-shadow: 0 4px 10px rgba(0, 123, 255, 0.3);
        }
        
        /* 頁籤內容面板 */
        .tab-content {
            display: none; /* 預設隱藏 */
            width: 100%;
            animation: fadeIn 0.5s ease;
        }

        .tab-content.active {
            display: block; /* 啟用時顯示 */
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 單元網格佈局 */
        .unit-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px;
        }

        /* 單元按鈕樣式 */
        .unit-btn {
            background: var(--card-bg);
            color: var(--text-primary);
            text-decoration: none;
            padding: 25px;
            border-radius: var(--radius);
            border: 1px solid #e0e0e0;
            box-shadow: var(--card-shadow);
            text-align: left;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 20px;
            min-height: 120px;
        }

        .unit-btn:hover {
            border-color: var(--primary-color);
            transform: translateY(-5px);
            box-shadow: var(--card-hover-shadow);
        }
        
        .unit-icon {
            font-size: 2.5em;
            width: 128px;
            text-align: center;
            flex-shrink: 0;
        }

        .unit-text {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .unit-text .code {
            font-size: 0.9em;
            font-weight: 700;
            color: var(--primary-color);
            margin-bottom: 5px;
        }
        
        .unit-text .title {
            font-size: 1.2em;
            font-weight: 600;
            min-height: 2.4em;
            line-height: 1.2em;
        }
        
        .unit-text .subtitle {
            font-size: 0.8em;
            color: #888;
            margin-top: 5px;
        }
        
        /* AI功能標籤樣式 */
        .ai-feature {
            font-size: 0.7em;
            color: var(--primary-color);
            background: rgba(102, 126, 234, 0.1);
            padding: 2px 6px;
            border-radius: 10px;
            margin-top: 4px;
            display: inline-block;
            font-weight: 500;
        }
        
        /* 頁面標題區域 */
        .page-header {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .ai-assistant-intro {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }
        
        .ai-avatar {
            width: 80px;
            height: 80px;
            animation: bounce 2s infinite;
            flex-shrink: 0;
        }

        .ai-avatar img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-10px); }
            60% { transform: translateY(-5px); }
        }
        
        .ai-speech-bubble {
            background: var(--card-bg);
            padding: 15px 20px;
            border-radius: 20px 20px 20px 5px;
            box-shadow: var(--card-shadow);
            position: relative;
            max-width: 400px;
        }
        
        .ai-speech-bubble::before {
            content: '';
            position: absolute;
            left: -10px;
            bottom: 10px;
            width: 0;
            height: 0;
            border: 10px solid transparent;
            border-right-color: var(--card-bg);
        }
        
        .ai-speech-bubble p {
            margin: 0;
            color: var(--text-primary);
            font-size: 0.95em;
            line-height: 1.4;
        }
        

        /* 禁用/即將推出樣式 */
        .unit-btn.disabled {
            background-color: #f8f9fa;
            cursor: not-allowed;
            opacity: 0.6;
            pointer-events: none; /* 讓連結不可點擊 */
        }
        
        .unit-btn.disabled:hover {
            transform: none;
            box-shadow: var(--card-shadow);
            border-color: #e0e0e0;
        }
        
        /* 主題過渡動畫 */
        .theme-transitioning * {
            transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
        }
        
        /* 顏色拾取器高亮效果 */
        .color-picker-highlight {
            box-shadow: 0 0 10px 2px rgba(102, 126, 234, 0.6) !important;
            position: relative;
            z-index: 1000;
        }
        
        /* 響應式設計 */
        @media (max-width: 768px) {
            h1 { font-size: 2.5em; }
            .tabs {
                flex-direction: row;
                flex-wrap: wrap;
                border-radius: var(--radius);
                gap: 8px;
                justify-content: center;
                padding: 8px;
            }
            .tab-btn {
                white-space: normal;
                flex: 1 1 calc(50% - 8px);
                min-width: 0;
                font-size: 0.95em;
                padding: 10px 12px;
                text-align: center;
                line-height: 1.3;
            }
            .unit-grid { grid-template-columns: 1fr; }
        }
    </style>

                document.write('#part1.tab-content { display: none !important; }');
                document.write('#' + hash + '.tab-content { display: block !important; }');
                document.write('</style>');
            }
        })();

    <script>
        // 切換標籤頁的函數
        function switchTab(targetId) {
            // 移除初始加載時的內聯樣式（防止 !important 規則干擾）
            const initialStyles = document.getElementById('initial-tab-styles');
            if (initialStyles) {
                initialStyles.remove();
            }

            // 處理按鈕的 active 狀態
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.dataset.target === targetId) {
                    btn.classList.add('active');
                }
            });

            // 處理內容面板的顯示
            document.querySelectorAll('.tab-content').forEach(panel => {
                panel.classList.remove('active');
            });
            const targetPanel = document.getElementById(targetId);
            if (targetPanel) {
                targetPanel.classList.add('active');
            }
        }

        // 檢查 URL hash 並顯示對應的標籤頁
        function checkHash() {
            const hash = window.location.hash.substring(1);
            if (hash && document.getElementById(hash)) {
                switchTab(hash);
            }
        }

        // 監聽 hash 變化
        window.addEventListener('hashchange', checkHash);

        // 點擊標籤按鈕時更新 hash
        document.addEventListener('DOMContentLoaded', () => {
            const tabsContainer = document.querySelector('.tabs');
            tabsContainer.addEventListener('click', (event) => {
                const clickedButton = event.target.closest('.tab-btn');
                if (!clickedButton) return;

                const targetId = clickedButton.dataset.target;
                window.location.hash = targetId;
                switchTab(targetId);
            });
        });
    </script>
